<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COTWAG SRL</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

/* HERO */
.hero {
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
    url('assets/images/hero.jpg');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.btn {
    background:#0ea5e9;
    padding:10px 20px;
    color:black;
    text-decoration:none;
    border-radius:5px;
}

/* GALERIA */
.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.gallery img {
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

/* WHATSAPP */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
}

.whatsapp img {
    width:60px;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    background:rgba(0,0,0,0.8);
    width:100%;
    height:100%;
    justify-content:center;
    align-items:center;
}

.modal img {
    max-width:90%;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>COTWAG SRL</h1>
        <p>Servicios Industriales</p>

        <a class="btn"
        href="https://wa.me/5492284536565?text=Hola%20me%20gustaria%20consultar%20sobre%20sus%20servicios"
        target="_blank">
        Contactar por WhatsApp
        </a>

    </div>
</section>

<!-- GALERIA -->
<section class="gallery">

<img src="assets/images/img1.jpg" onclick="openModal(this.src)">
<img src="assets/images/img2.jpg" onclick="openModal(this.src)">
<img src="assets/images/img3.jpg" onclick="openModal(this.src)">
<img src="assets/images/img4.jpg" onclick="openModal(this.src)">

</section>

<!-- BOTON WHATSAPP -->
<a class="whatsapp"
href="https://wa.me/5492284536565?text=Hola%20me%20gustaria%20mas%20informacion"
target="_blank">

<img src="assets/images/ws.png">

</a>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
    <img id="modalImg">
</div>

<script>
function openModal(src){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modalImg").src=src;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
``
